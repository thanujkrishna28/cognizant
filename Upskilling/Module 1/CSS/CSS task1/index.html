<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Inclusion Methods</title>

    <!-- Internal CSS -->
    <style>
        body {
            background-color: lightblue;
        }
    </style>

    <!-- External CSS -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <!-- Inline CSS -->
    <h1 style="color:red;">
        Community Event Portal
    </h1>

    <h2 class="header">
        Upcoming Events
    </h2>

    <p class="content">
        Welcome to the Community Event Portal. This page demonstrates
        Inline CSS, Internal CSS, and External CSS.
    </p>

    <button class="register-btn">
        Register Now
    </button>

</body>
</html>
