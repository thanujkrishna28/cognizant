<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome Banner</title>

    <style>
        #welcomeBanner {
            background-color: blue;
            color: white;
            padding: 20px;
            text-align: center;
        }

        .highlight {
            background-color: yellow;
            font-weight: bold;
            padding: 5px;
        }
    </style>
</head>
<body>

    <div id="welcomeBanner">
        <h2>Welcome User!</h2>
        <p>
            Enjoy our latest events.
            <span style="color:red; font-weight:bold;">
                Special Offer: 20% Discount!
            </span>
        </p>
    </div>

    <p class="highlight">Limited seats available.</p>

</body>
</html>
