<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Gallery</title>

    <style>
        .event-image {
            width: 180px;
            height: 120px;
            border: 3px solid black;
        }

        table {
            border-collapse: collapse;
            margin: auto;
        }

        td {
            padding: 10px;
            text-align: center;
        }
    </style>
</head>
<body>

    <h2 align="center">Community Event Gallery</h2>

    <table border="1">
        <tr>
            <td>
                <img src="https://via.placeholder.com/180x120"
                     alt="Music Event"
                     title="Music Event"
                     class="event-image">
                <p>Music Event</p>
            </td>

            <td>
                <img src="https://via.placeholder.com/180x120"
                     alt="Food Festival"
                     title="Food Festival"
                     class="event-image">
                <p>Food Festival</p>
            </td>

            <td>
                <img src="https://via.placeholder.com/180x120"
                     alt="Sports Meet"
                     title="Sports Meet"
                     class="event-image">
                <p>Sports Meet</p>
            </td>
        </tr>

        <tr>
            <td>
                <img src="https://via.placeholder.com/180x120"
                     alt="Art Show"
                     title="Art Show"
                     class="event-image">
                <p>Art Show</p>
            </td>

            <td>
                <img src="https://via.placeholder.com/180x120"
                     alt="Community Meeting"
                     title="Community Meeting"
                     class="event-image">
                <p>Community Meeting</p>
            </td>

            <td>
                <img src="https://via.placeholder.com/180x120"
                     alt="Charity Event"
                     title="Charity Event"
                     class="event-image">
                <p>Charity Event</p>
            </td>
        </tr>
    </table>

</body>
</html>
